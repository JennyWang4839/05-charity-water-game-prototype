<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charity Water Escape Room Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="intro">
      <h1>Charity Water Escape Room Game</h1>
    </div>

    <div id="room1" class="room">
        <h2>Bedroom</h2>

        <p>Fluff and feathers, calm and white,</p>

        <p>Lift what cushions sleep at night.</p>

        <img src="img/bedroom.png" alt="Bedroom" class="room">

        <div class="objects">
          <button id="pillow"></button>

          <button id="painting"></button>
        </div>
    </div>

    <button onclick="openInventory()" id="inventoryBtn">Inventory</button>

    <div id="inventory">
        <h2>Inventory</h2>
        <ul id="inventoryList"></ul>
        <button onclick="closeInventory()">Close</button>
    </div>

    <div id="popup-clue" class="popup hidden">
      <h3>You found a clue!</h3>

      <p>A picture hides more than paint and frame.</p>

      <p>One touch wakes it,</p>

      <p>Two reveal the game.</p>

      <button id="clue" onclick="document.getElementById('popup-clue').classList.add('hidden')">Close</button>
    </div>

    <div id="popup-code" class="popup hidden">
      <h3>You found the code!</h3>

      <p>Code: World Water Day</p>

      <button id="collectCode" class="addToInventory" onclick="addToInventory('Code: World Water Day')">Take</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
