<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charity Water Escape Room Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Charity Water Escape Room Game</h1>

    <div id="room1" class="room">
        <h2>Bedroom</h2>

        <p>Find clues to open the door.</p>

        <img src="img/bedroom.png" alt="Bedroom" class="room-image">

        <div class="objects">
          <button onclick="inspect('chair')">Chair</button>

          <button onclick="inspect('painting')">Painting</button>
        </div>

        <button onclick="nextRoom()">Go to Bedroom</button>
    </div>

    <div id="inventory">
        <h3>Inventory</h3>
        <ul id="inventory-list"></ul>
    </div>

    <script src="script.js"></script>

    
</body>
</html>
